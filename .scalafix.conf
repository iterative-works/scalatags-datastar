// Scalafix configuration. See https://scalacenter.github.io/scalafix/.
//
// SemanticDB is provided by Mill (mill-scalafix uses Mill's semanticDbData task
// internally, so no -Xsemanticdb flag is required on Scala 3).
//
// IMPORTANT: RemoveUnused.imports must stay false here. OrganizeImports already
// removes unused imports via -Wunused:imports diagnostics, and combining the two
// on the same source produces conflicting patches and broken code. See:
// https://scalacenter.github.io/scalafix/docs/rules/OrganizeImports.html
rules = [
  DisableSyntax
  OrganizeImports
  RemoveUnused
]

DisableSyntax {
  noNulls = true
  noVars = true
  noThrows = true
  noReturns = true
}

OrganizeImports.removeUnused = true
OrganizeImports.targetDialect = Scala3

RemoveUnused.imports = false
RemoveUnused.privates = true
RemoveUnused.locals = true
RemoveUnused.patternvars = true
RemoveUnused.params = true
